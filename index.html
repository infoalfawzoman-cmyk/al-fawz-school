<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة التوظيف - مدرسة براعم الظاهرة الخاصة</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; direction: rtl; }
        .form-container { max-width: 600px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-container img { max-width: 150px; height: auto; }
        .school-title { text-align: center; color: #0f172a; font-weight: bold; margin-bottom: 25px; font-size: 22px; }
        .form-group { margin-bottom: 24px; text-align: right; }
        .form-label { font-weight: 600; color: #334155; margin-bottom: 8px; font-size: 15px; }
        .form-control, .form-select { padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 16px; background-color: #f8fafc; transition: all 0.3s; width: 100%; box-sizing: border-box; }
        .form-control:focus, .form-select:focus { background-color: #fff; border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1); outline: none; }
        .upload-box { border: 2px dashed #cbd5e1; padding: 35px; border-radius: 10px; background: #f8fafc; text-align: center; cursor: pointer; position: relative; transition: border-color 0.3s; }
        .upload-box:hover { border-color: #1d4ed8; }
        .btn-submit { background-color: #1e3a8a; color: #fff; padding: 14px; border-radius: 10px; font-size: 18px; font-weight: bold; width: 100%; border: none; transition: background 0.3s; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background-color: #172554; }
    </style>
</head>
<body>

<div class="container px-3">
    <div class="form-container">
        
        <!-- لوجو المدرسة وعنوان الاستمارة -->
        <div class="logo-container">
            <span style="font-size: 60px;">🏫</span>
            <h1 class="school-title">استمارة طلب انضمام لهيئة التدريس<br><span style="font-size: 16px; color: #64748b; font-weight: normal;">مدرسة براعم الظاهرة الخاصة - سلطنة عمان</span></h1>
        </div>

        <!-- بداية الاستمارة وكود الإرسال الشغال -->
        <form action="https://formsubmit.co/info.alfawzoman@gmail.com" method="POST" enctype="multipart/form-data">
            
            <!-- الاسم بالكامل -->
            <div class="form-group">
                <label class="form-label">الاسم بالكامل (رباعي) <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="الاسم" placeholder="أدخل اسمك كاملاً" required style="direction: rtl; text-align: right;">
            </div>

            <!-- التخصص الوظيفي المستهدف (بعد التحديث والتنسيق) -->
            <div class="form-group">
                <label class="form-label">التخصص الوظيفي المستهدف <span class="text-danger">*</span></label>
                <select class="form-select" name="التخصص" required style="direction: rtl; text-align: right;">
                    <option value="" selected disabled>اختر التخصص المطلوب...</option>
                    <option value="لغة عربية">لغة عربية</option>
                    <option value="تربية إسلامية">تربية إسلامية</option>
                    <option value="لغة إنجليزية">لغة إنجليزية</option>
                    <option value="لغة فرنسية">لغة فرنسية</option>
                    <option value="لغة ألمانية">لغة ألمانية</option>
                    <option value="رياضيات">رياضيات</option>
                    <option value="علوم">علوم</option>
                    <option value="دراسات اجتماعية">دراسات اجتماعية</option>
                    <option value="تكنولوجيا معلومات">تكنولوجيا معلومات</option>
                    <option value="رياض أطفال">رياض أطفال</option>
                    <option value="تربية فنية">تربية فنية</option>
                    <option value="فنون تشكيلية">فنون تشكيلية</option>
                    <option value="موسيقى">موسيقى</option>
                    <option value="وثائق ومكتبات">وثائق ومكتبات</option>
                    <option value="أخصائي اجتماعي/ نفسي">أخصائي اجتماعي/ نفسي</option>
                </select>
            </div>

            <!-- رقم الهاتف -->
            <div class="form-group">
                <label class="form-label">رقم الهاتف (الواتساب) <span class="text-danger">*</span></label>
                <input type="tel" class="form-control" name="رقم الهاتف" placeholder="01xxxxxxxxx" required style="direction: ltr; text-align: left;">
            </div>

            <!-- خانة البريد الإلكتروني -->
            <div class="form-group">
                <label for="user_email" class="form-label">البريد الإلكتروني <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="user_email" name="البريد الإلكتروني" placeholder="example@email.com" required style="direction: ltr; text-align: left;">
            </div>

            <!-- عدد سنوات الخبرة -->
            <div class="form-group">
                <label class="form-label">عدد سنوات الخبرة <span class="text-danger">*</span></label>
                <select class="form-select" name="سنوات الخبرة" required style="direction: rtl; text-align: right;">
                    <option value="" selected disabled>اختر سنوات الخبرة...</option>
                    <option value="بدون خبرة">بدون خبرة</option>
                    <option value="من 1 إلى 3 سنوات">من 1 إلى 3 سنوات</option>
                    <option value="من 3 إلى 5 سنوات">من 3 إلى 5 سنوات</option>
                    <option value="أكثر من 5 سنوات">أكثر من 5 سنوات</option>
                </select>
            </div>

            <!-- رفع السيرة الذاتية CV -->
            <div class="form-group">
                <label class="form-label">السيرة الذاتية (صيغة PDF فقط) <span class="text-danger">*</span></label>
                <div class="upload-box">
                    <span style="font-size: 40px; display: block; margin-bottom: 10px;">📁</span>
                    <p style="margin: 0; color: #64748b; font-size: 15px; font-weight: 500;">اضغط هنا لرفع الـ CV أو اسحب الملف</p>
                    <input type="file" name="السيرة الذاتية" accept=".pdf" required style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
                </div>
            </div>

            <!-- زر إرسال الطلب  -->
            <button type="submit" class="btn-submit">إرسال الطلب </button>
            
        </form>
    </div>
</div>

</body>
</html>
